name: Deploy to Production Canister

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: docusaurus/package-lock.json

    - name: Cache dfx installation
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/dfinity
          ~/.local/share/dfx
        key: dfx-full-${{ runner.os }}-${{ hashFiles('**/dfx.json') }}-v1
        restore-keys: |
          dfx-full-${{ runner.os }}-

    - name: Cache Node.js build
      uses: actions/cache@v4
      with:
        path: |
          docusaurus/build
          docusaurus/.docusaurus
          docusaurus/node_modules/.cache
        key: docusaurus-build-${{ runner.os }}-${{ hashFiles('docusaurus/package-lock.json', 'docusaurus/docusaurus.config.js', 'docusaurus/src/**', 'docusaurus/blog/**', 'docusaurus/docs/**', 'static/**') }}
        restore-keys: |
          docusaurus-build-${{ runner.os }}-

    - name: Setup DFX
      run: |
        DFXVM_VERSION="1.0.1"
        DFXVM_DIR="$HOME/.local/share/dfx"

        # Check if dfxvm is already cached
        if [ ! -f "$DFXVM_DIR/bin/dfxvm" ]; then
          echo "Installing dfxvm..."
          mkdir -p "$DFXVM_DIR/bin"

          # Download dfxvm for Linux
          curl -L "https://github.com/dfinity/dfxvm/releases/download/v${DFXVM_VERSION}/dfxvm-x86_64-unknown-linux-gnu.tar.gz" -o dfxvm.tar.gz

          # Extract dfxvm
          tar -xzf dfxvm.tar.gz
          mv dfxvm-x86_64-unknown-linux-gnu/dfxvm "$DFXVM_DIR/bin/"
          chmod +x "$DFXVM_DIR/bin/dfxvm"
        else
          echo "Using cached dfxvm installation"
        fi

        # Add to PATH and export for current session
        echo "$DFXVM_DIR/bin" >> $GITHUB_PATH
        export PATH="$DFXVM_DIR/bin:$PATH"

        # Check if DFX is already installed
        if [ ! -f "$HOME/.local/share/dfx/versions/0.24.3/dfx" ]; then
          echo "Installing DFX 0.24.3..."
          dfxvm default 0.24.3
        else
          echo "Using cached DFX installation"
        fi

        # Add dfx to PATH
        echo "$HOME/.local/share/dfx/versions/0.24.3" >> $GITHUB_PATH
        export PATH="$HOME/.local/share/dfx/versions/0.24.3:$PATH"

        # Verify installation
        dfx --version

        # Setup identity
        echo "${{secrets.GUIZISHANREN}}" > identity.pem
        chmod 400 identity.pem
        mkdir -p ~/.config/dfx/identity/default
        mv identity.pem ~/.config/dfx/identity/default/identity.pem
        dfx identity list

    - name: Install dependencies
      run: |
        cd docusaurus
        npm ci --prefer-offline --no-audit --silent
        cd ..

    - name: Build
      run: |
        cd docusaurus

        # Check if we can use cached build
        if [ -d "build" ] && [ -f "build/index.html" ]; then
          echo "Found existing build, checking if rebuild needed..."
          # Force rebuild for now, but cache will still speed up webpack/docusaurus internal processes
        fi

        npm run build

        # Create IC assets configuration for proper XML handling
        cat > build/.ic-assets.json5 << 'EOF'
        [
          {
            "match": "sitemap.xml",
            "headers": {
              "Content-Type": "application/xml; charset=utf-8",
              "Cache-Control": "public, max-age=3600"
            },
            "ignore": false
          },
          {
            "match": "**/*",
            "headers": {
              "Cache-Control": "public, max-age=31536000, immutable"
            }
          }
        ]
        EOF

        cd ..

    - name: Deploy to IC
      run: |
        # Create canister_ids.json
        echo '{ "hyxyz": { "ic": "${{ vars.PRODUCTION_CANISTER_ID }}" } }' > canister_ids.json
        
        # Deploy directly to IC without starting local replica with upgrade-unchanged flag
        $HOME/.local/share/dfx/versions/0.24.3/dfx deploy hyxyz --network=ic --upgrade-unchanged --yes

    - name: Summarize
      run: echo 'https://${{ vars.PRODUCTION_CANISTER_ID }}.icp0.io' >> $GITHUB_STEP_SUMMARY
