name: Deploy to Production Canister

on: 
  # Use workflow_dispatch to manually trigger the action
  # workflow_dispatch:

  # trigger the workflow when a PR is merged or when a commit is made directly to the main branch
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Prepare
      run: |
        DFX_VERSION=0.14.3 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
        echo "${{secrets.GUIZISHANREN}}" > identity.pem
        chmod 400 identity.pem
        mkdir -p ~/.config/dfx/identity/default
        mv identity.pem ~/.config/dfx/identity/default/identity.pem
        dfx identity list
    - uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Build
      run: |
        cd docusaurus
        npm install
        npm run build
        cd ..
    - name: Deploy
      run: |
        rm canister_ids.json
        echo '{ "hyxyz": { "ic": "${{ vars.PRODUCTION_CANISTER_ID }}" } }' > canister_ids.json
        dfx start --background --clean
        dfx deploy --network=ic
    - name: Summarize
      run: echo 'https://${{ vars.PRODUCTION_CANISTER_ID }}.icp0.io' >> $GITHUB_STEP_SUMMARY
